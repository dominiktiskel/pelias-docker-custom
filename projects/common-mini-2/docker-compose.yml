networks:
  pelias_common_mini_2:
    driver: bridge
services:
  libpostal:
    image: pelias/libpostal-service
    container_name: common_mini_2_libpostal
    user: "${DOCKER_USER}"
    restart: always
    ports: [ "127.0.0.1:30400:4400" ]
    networks: [ "pelias_common_mini_2" ]
  schema:
    image: pelias/schema:master
    container_name: common_mini_2_schema
    user: "${DOCKER_USER}"
    volumes:
      - "./pelias.json:/code/pelias.json"
    networks: [ "pelias_common_mini_2" ]
  api:
    image: tiskel/pelias-api:v3.0.2
    container_name: common_mini_2_api
    user: "${DOCKER_USER}"
    restart: always
    environment: [ "PORT=4000" ]
    ports: [ "0.0.0.0:30000:4000" ]
    volumes:
      - "./pelias.json:/code/pelias.json"
    networks: [ "pelias_common_mini_2" ]
  openstreetmap:
    image: tiskel/openstreetmap:v4.0.0
    container_name: common_mini_2_openstreetmap
    user: "${DOCKER_USER}"
    environment:
      # bin/start passes --max_old_space_size=${NODE_MAX_HEAP:-8000} on the CLI,
      # which overrides NODE_OPTIONS - so NODE_MAX_HEAP is the knob that works
      NODE_MAX_HEAP: "16384"
    volumes:
      - "./pelias.json:/code/pelias.json"
      - "${DATA_DIR}:/data"
    networks: [ "pelias_common_mini_2" ]
  elasticsearch:
    image: pelias/elasticsearch:7.17.27
    container_name: common_mini_2_elasticsearch
    user: "${DOCKER_USER}"
    restart: always
    ports: [ "127.0.0.1:30200:9200", "127.0.0.1:30300:9300" ]
    volumes:
      - "./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro"
      - "${DATA_DIR}/elasticsearch:/usr/share/elasticsearch/data"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    cap_add: [ "IPC_LOCK" ]
    security_opt:
      - seccomp=unconfined
    networks: [ "pelias_common_mini_2" ]
