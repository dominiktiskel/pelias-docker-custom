networks:
  pelias_slaskie_mini2:
    driver: bridge
services:
  libpostal:
    image: pelias/libpostal-service
    container_name: slaskie_mini2_libpostal
    user: "${DOCKER_USER}"
    restart: always
    ports: [ "127.0.0.1:27400:4400" ]
    networks: [ "pelias_slaskie_mini2" ]
  schema:
    image: pelias/schema:master
    container_name: slaskie_mini2_schema
    user: "${DOCKER_USER}"
    volumes:
      - "./pelias.json:/code/pelias.json"
    networks: [ "pelias_slaskie_mini2" ]
  api:
    image: tiskel/pelias-api:v1.0.9
    container_name: slaskie_mini2_api
    user: "${DOCKER_USER}"
    restart: always
    environment: [ "PORT=4000" ]
    ports: [ "0.0.0.0:27000:4000" ]
    volumes:
      - "./pelias.json:/code/pelias.json"
    networks: [ "pelias_slaskie_mini2" ]
  openstreetmap:
    image: tiskel/openstreetmap:v2.11.0
    container_name: slaskie_mini2_openstreetmap
    user: "${DOCKER_USER}"
    environment:
      NODE_OPTIONS: "--max-old-space-size=16384"
    volumes:
      - "./pelias.json:/code/pelias.json"
      - "${DATA_DIR}:/data"
      - "../../../openstreetmap/config:/code/pelias/openstreetmap/config"
      - "../../../openstreetmap/stream:/code/pelias/openstreetmap/stream"
    networks: [ "pelias_slaskie_mini2" ]
  elasticsearch:
    image: pelias/elasticsearch:7.17.27
    container_name: slaskie_mini2_elasticsearch
    user: "${DOCKER_USER}"
    restart: always
    ports: [ "127.0.0.1:27200:9200", "127.0.0.1:27300:9300" ]
    volumes:
      - "./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro"
      - "${DATA_DIR}/elasticsearch:/usr/share/elasticsearch/data"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    cap_add: [ "IPC_LOCK" ]
    security_opt:
      - seccomp=unconfined
    networks: [ "pelias_slaskie_mini2" ]
